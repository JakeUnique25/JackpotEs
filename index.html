<script>
const minimumJackpots = {
  ultralotto: 75000000,
  grandlotto: 45000000,
  superlotto: 25000000,
  megalotto: 15000000,
  lotto: 10000000
};

// Format input with commas and allow decimals
function formatNumberInput(input) {
  let value = input.value;

  // Remove commas
  value = value.replace(/,/g, '');

  // Allow only digits and one decimal point
  value = value.replace(/[^0-9.]/g, '');

  // Prevent multiple decimals
  const parts = value.split('.');
  if (parts.length > 2) {
    value = parts[0] + '.' + parts.slice(1).join('');
  }

  // Limit to 2 decimal places
  if (parts.length === 2) {
    parts[1] = parts[1].slice(0, 2);
    value = parts[0] + '.' + parts[1];
  }

  if (!value) {
    input.value = '';
    return;
  }

  const number = parseFloat(value);
  if (!isNaN(number)) {
    input.value = number.toLocaleString('en-PH', {
      minimumFractionDigits: value.includes('.') ? 2 : 0,
      maximumFractionDigits: 2
    });
  }
}

document.getElementById('carryOver').addEventListener('input', function() {
  formatNumberInput(this);
});
document.getElementById('currentAllocation').addEventListener('input', function() {
  formatNumberInput(this);
});

function estimateJackpot() {
  const game = document.getElementById('game').value;

  const carryOver = parseFloat(
    document.getElementById('carryOver').value.replace(/,/g,'')
  ) || 0;

  const currentAllocation = parseFloat(
    document.getElementById('currentAllocation').value.replace(/,/g,'')
  ) || 0;

  const minJackpot = minimumJackpots[game];
  const total = carryOver + currentAllocation;

  let estimated;
  if (total < minJackpot) {
    estimated = minJackpot;
  } else {
    estimated = Math.floor(total / 500000) * 500000;
  }

  document.getElementById('result').textContent =
    "Estimated Jackpot: ₱" + estimated.toLocaleString('en-PH', {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    });
}
</script>
